name: Build pcsclite for Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install windows-build-tools
        run: |
          npm config set msvs_version 2022
          npm install -g node-gyp

      - name: Install and build native addon
        run: |
          npm install --build-from-source
          dir node_modules\@pokusew\pcsclite\build\Release\

      - name: Upload pcsclite.node
        uses: actions/upload-artifact@v4
        with:
          name: pcsclite-win-x64-node${{ matrix.node-version }}
          path: node_modules/@pokusew/pcsclite/build/Release/pcsclite.node
          retention-days: 90
